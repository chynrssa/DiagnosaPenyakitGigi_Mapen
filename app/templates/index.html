{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-8">

    <div class="card">
      <div class="card-header bg-white">
        <h4 class="mb-1">Halo! Apa yang Anda rasakan?</h4>
        <p class="text-muted mb-0">
          Centang gejala yang Anda alami di bawah ini:
        </p>
      </div>

      <div class="card-body">

        {% if error %}
        <div class="alert alert-danger">
          {{ error }}
        </div>
        {% endif %}

        <form action="/diagnosa" method="POST">

          <!-- TABEL GEJALA -->
          <div class="table-responsive">
            <table class="table table-bordered align-middle">
              <thead class="table-light text-center">
                <tr>
                  <th style="width: 10%;">Pilih</th>
                  <th style="width: 20%;">Kode</th>
                  <th>Gejala</th>
                </tr>
              </thead>

              <tbody>
                {% for kode, nama in gejala_dict.items() %}
                <tr class="gejala-row">
                  
                  <!-- Checkbox -->
                  <td class="text-center">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      name="gejala"
                      value="{{ kode }}"
                      id="{{ kode }}"
                    />
                  </td>

                  <!-- Kode -->
                  <td class="text-center">
                    <span class="badge bg-secondary">
                      {{ kode }}
                    </span>
                  </td>

                  <!-- Nama Gejala -->
                  <td>
                    <label for="{{ kode }}" class="mb-0 w-100">
                      {{ nama }}
                    </label>
                  </td>

                </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>

          <!-- BUTTON -->
          <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary btn-lg">
              Diagnosa Sekarang
            </button>
          </div>

        </form>

      </div>
    </div>

  </div>
</div>

<!-- SCRIPT AGAR KLIK BARIS = CENTANG -->
<script>
  document.querySelectorAll(".gejala-row").forEach((row) => {
    row.addEventListener("click", function (e) {
      if (e.target.tagName !== "INPUT") {
        const checkbox = this.querySelector("input");
        checkbox.checked = !checkbox.checked;
      }
    });
  });
</script>

{% endblock %}
